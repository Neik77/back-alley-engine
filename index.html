<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BAE — Back Alley Engine™</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
  }

  .header {
    margin-bottom: 2rem;
    border-bottom: 1px solid #222;
    padding-bottom: 1.25rem;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .header h1 span {
    color: #c9a84c;
  }

  .header p {
    font-size: 13px;
    color: #666;
    margin-top: 5px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .mode-btn {
    padding: 10px 6px;
    border: 1px solid #222;
    border-radius: 8px;
    background: #111;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: #f0f0f0;
  }

  .mode-btn:hover {
    background: #1a1a1a;
    border-color: #444;
  }

  .mode-btn.active {
    border: 1.5px solid #c9a84c;
    background: #1a1500;
  }

  .mode-btn .icon { font-size: 16px; display: block; margin-bottom: 4px; }

  .mode-btn .label {
    font-size: 10px;
    font-weight: 600;
    color: #888;
    line-height: 1.3;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .mode-btn.active .label { color: #c9a84c; }

  .panel {
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 700;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 1rem;
  }

  .field-group { margin-bottom: 1rem; }

  .field-group label {
    display: block;
    font-size: 12px;
    color: #777;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field-group input,
  .field-group textarea,
  .field-group select {
    width: 100%;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    background: #0d0d0d;
    color: #f0f0f0;
    transition: border-color 0.15s;
  }

  .field-group input:focus,
  .field-group textarea:focus,
  .field-group select:focus {
    outline: none;
    border-color: #c9a84c;
  }

  .field-group textarea { resize: vertical; min-height: 80px; }

  .field-group select option { background: #111; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .gen-btn {
    width: 100%;
    padding: 12px;
    background: #c9a84c;
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: background 0.15s;
  }

  .gen-btn:hover { background: #e0be6a; }
  .gen-btn:active { transform: scale(0.99); }
  .gen-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

  .output-area { margin-top: 1.25rem; display: none; }
  .output-area.show { display: block; }

  .out-tab-row { display: flex; gap: 6px; margin-bottom: 8px; }

  .out-tab {
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 700;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    background: #111;
    cursor: pointer;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .out-tab.active {
    background: #c9a84c;
    color: #0a0a0a;
    border-color: #c9a84c;
  }

  .out-block {
    background: #0d0d0d;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 1.25rem;
    font-size: 14px;
    line-height: 1.8;
    color: #ccc;
    white-space: pre-wrap;
    display: none;
    min-height: 100px;
  }

  .out-block.active { display: block; }

  .footer {
    margin-top: 2.5rem;
    padding-top: 1rem;
    border-top: 1px solid #1a1a1a;
    text-align: center;
    font-size: 11px;
    color: #333;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  @media (max-width: 500px) {
    .mode-grid { grid-template-columns: repeat(3, 1fr); }
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>BAE <span>—</span> Back Alley Engine™</h1>
    <p>Narrative Systems Builder · After Dark Builds™</p>
  </div>

  <div class="mode-grid">
    <button class="mode-btn active" onclick="setMode(0)" id="m0">
      <span class="icon">🧬</span>
      <span class="label">Character</span>
    </button>
    <button class="mode-btn" onclick="setMode(1)" id="m1">
      <span class="icon">🎬</span>
      <span class="label">Scene Gen</span>
    </button>
    <button class="mode-btn" onclick="setMode(2)" id="m2">
      <span class="icon">📖</span>
      <span class="label">Expand</span>
    </button>
    <button class="mode-btn" onclick="setMode(3)" id="m3">
      <span class="icon">⚡</span>
      <span class="label">Prompts</span>
    </button>
    <button class="mode-btn" onclick="setMode(4)" id="m4">
      <span class="icon">💰</span>
      <span class="label">Product</span>
    </button>
  </div>

  <div id="panel-0" class="panel">
    <div class="panel-title">Character Build</div>
    <div class="row">
      <div class="field-group"><label>Character name</label><input type="text" id="c-name" placeholder="e.g. Mara Voss" /></div>
      <div class="field-group"><label>Role / archetype</label><input type="text" id="c-role" placeholder="e.g. burned-out healer" /></div>
    </div>
    <div class="field-group"><label>Core desire</label><input type="text" id="c-desire" placeholder="What do they want most?" /></div>
    <div class="field-group"><label>Central conflict</label><input type="text" id="c-conflict" placeholder="What stands in their way?" /></div>
    <div class="field-group"><label>Additional notes (optional)</label><textarea id="c-notes" placeholder="Backstory fragments, personality hints, world context..."></textarea></div>
  </div>

  <div id="panel-1" class="panel" style="display:none">
    <div class="panel-title">Scene Generation</div>
    <div class="row">
      <div class="field-group"><label>Character(s)</label><input type="text" id="s-chars" placeholder="Who is in this scene?" /></div>
      <div class="field-group"><label>Setting</label><input type="text" id="s-setting" placeholder="Where / when?" /></div>
    </div>
    <div class="field-group"><label>Scene goal / what's at stake</label><input type="text" id="s-goal" placeholder="What does someone want from this scene?" /></div>
    <div class="field-group"><label>Emotional undercurrent</label><input type="text" id="s-emotion" placeholder="e.g. suppressed desire, quiet tension, unspoken need" /></div>
  </div>

  <div id="panel-2" class="panel" style="display:none">
    <div class="panel-title">Story Expansion</div>
    <div class="field-group"><label>Your short premise or scene snippet</label><textarea id="e-premise" placeholder="Paste your short idea, opening line, or summary here..." style="min-height:100px"></textarea></div>
    <div class="field-group"><label>Target structure</label>
      <select id="e-length">
        <option value="3-scene">3-scene arc</option>
        <option value="5-scene">5-scene structure</option>
        <option value="chapter">Full chapter outline</option>
      </select>
    </div>
  </div>

  <div id="panel-3" class="panel" style="display:none">
    <div class="panel-title">Prompt Generation</div>
    <div class="row">
      <div class="field-group"><label>Topic / skill to prompt</label><input type="text" id="p-topic" placeholder="e.g. slow burn tension scene" /></div>
      <div class="field-group"><label>Use case</label>
        <select id="p-use">
          <option value="character">Character writing</option>
          <option value="scene">Scene writing</option>
          <option value="ebook">Ebook content</option>
          <option value="audio">Audio script</option>
          <option value="marketing">Marketing copy</option>
        </select>
      </div>
    </div>
    <div class="field-group"><label>Variable placeholders needed?</label><input type="text" id="p-vars" placeholder="e.g. [name], [setting], [conflict_type]" /></div>
  </div>

  <div id="panel-4" class="panel" style="display:none">
    <div class="panel-title">Product Conversion</div>
    <div class="field-group"><label>Paste your story / scene / character output</label><textarea id="pr-input" placeholder="Drop any BAE output here to convert it into a product..." style="min-height:100px"></textarea></div>
    <div class="field-group"><label>Target product type</label>
      <select id="pr-type">
        <option value="ebook">Ebook concept + outline</option>
        <option value="audio">Audio script</option>
        <option value="promptpack">Prompt pack ($27–$47)</option>
        <option value="bundle">Full content bundle</option>
      </select>
    </div>
  </div>

  <button class="gen-btn" onclick="generate()" id="gen-btn">Generate</button>

  <div id="output-area" class="output-area">
    <div class="out-tab-row" id="tab-row"></div>
    <div id="out-clean" class="out-block active"></div>
    <div id="out-tension" class="out-block"></div>
    <div id="out-single" class="out-block active"></div>
  </div>

  <div class="footer">After Dark Builds™ · BAE — Back Alley Engine™</div>

</div>

<script>
let currentMode = 0;

function setMode(n) {
  for (let i = 0; i < 5; i++) {
    document.getElementById('m' + i).classList.toggle('active', i === n);
    const p = document.getElementById('panel-' + i);
    if (p) p.style.display = i === n ? 'block' : 'none';
  }
  currentMode = n;
  document.getElementById('output-area').classList.remove('show');
}

function showTab(which) {
  document.getElementById('out-clean').classList.toggle('active', which === 'clean');
  document.getElementById('out-tension').classList.toggle('active', which === 'tension');
  document.getElementById('out-single').classList.toggle('active', which === 'single');
  document.querySelectorAll('.out-tab').forEach(t => t.classList.remove('active'));
  const active = document.querySelector('.out-tab[data-tab="' + which + '"]');
  if (active) active.classList.add('active');
}

function buildPrompt() {
  const modes = ['Character Build', 'Scene Generation', 'Story Expansion', 'Prompt Generation', 'Product Conversion'];
  let sys = `You are BAE (Back Alley Engine), a Narrative Systems Builder AI for After Dark Builds™.
Your role is to generate structured erotic storytelling outputs and convert them into monetizable systems.
All characters are consenting adults. No minors. No non-consensual scenarios presented approvingly.
No generic responses. Every output must be specific, usable, and structured.
Focus on: system → asset → product.
Current mode: ${modes[currentMode]}`;

  let user = '';

  if (currentMode === 0) {
    const name = document.getElementById('c-name').value || 'unnamed';
    const role = document.getElementById('c-role').value || 'undefined';
    const desire = document.getElementById('c-desire').value;
    const conflict = document.getElementById('c-conflict').value;
    const notes = document.getElementById('c-notes').value;
    user = `Generate a full CHARACTER BUILD for:
Name: ${name}
Role: ${role}
${desire ? 'Desire: ' + desire : ''}
${conflict ? 'Conflict: ' + conflict : ''}
${notes ? 'Notes: ' + notes : ''}

Return:
• Name, Role, Personality traits (5)
• Desire & Conflict
• Character DNA: voice, behavior, reactions
• CLEAN VERSION — platform-safe narrative intro
• TENSION VERSION — elevated emotional and sensual intensity, same character, more raw

Label both sections clearly.`;

  } else if (currentMode === 1) {
    const chars = document.getElementById('s-chars').value;
    const setting = document.getElementById('s-setting').value;
    const goal = document.getElementById('s-goal').value;
    const emotion = document.getElementById('s-emotion').value;
    user = `Generate a SCENE for:
Characters: ${chars || 'unspecified'}
Setting: ${setting || 'unspecified'}
${goal ? 'Goal/Stakes: ' + goal : ''}
${emotion ? 'Emotional undercurrent: ' + emotion : ''}

Return:
CLEAN VERSION — scene setup, interaction, emotional tension, turning point (platform-safe)
TENSION VERSION — same scene, elevated sensual intensity, more raw honesty, stronger turning point

Label both sections clearly.`;

  } else if (currentMode === 2) {
    const premise = document.getElementById('e-premise').value;
    const length = document.getElementById('e-length').value;
    user = `EXPAND this premise into a ${length}:
"${premise}"

Include: scene titles, rising tension beats, character shifts, and a clear progression arc.
Make it specific, not generic. Every beat should feel earned.`;

  } else if (currentMode === 3) {
    const topic = document.getElementById('p-topic').value;
    const use = document.getElementById('p-use').value;
    const vars = document.getElementById('p-vars').value;
    user = `Generate a structured, reusable prompt for:
Topic: ${topic || 'general narrative'}
Use case: ${use}
${vars ? 'Variable placeholders: ' + vars : ''}

Return a prompt with:
• Context layer
• Persona instruction
• Direction parameters
• Output format specification
Make it copy-paste ready with clear variable slots.`;

  } else if (currentMode === 4) {
    const input = document.getElementById('pr-input').value;
    const type = document.getElementById('pr-type').value;
    user = `Convert this narrative content into a ${type}:

"${input || '[narrative content not provided — generate a sample product concept]'}"

Return a complete product brief: title, hook, structure, price point, delivery format, and 3 marketing angles. Make it sellable.`;
  }

  return { sys, user };
}

async function generate() {
  const btn = document.getElementById('gen-btn');
  btn.textContent = 'Generating...';
  btn.disabled = true;

  const outArea = document.getElementById('output-area');
  const tabRow = document.getElementById('tab-row');
  const outClean = document.getElementById('out-clean');
  const outTension = document.getElementById('out-tension');
  const outSingle = document.getElementById('out-single');

  const hasDualOutput = currentMode === 0 || currentMode === 1;

  tabRow.innerHTML = '';
  outClean.classList.remove('active');
  outTension.classList.remove('active');
  outSingle.classList.remove('active');

  if (hasDualOutput) {
    tabRow.innerHTML = `
      <button class="out-tab active" data-tab="clean" onclick="showTab('clean')">Clean version</button>
      <button class="out-tab" data-tab="tension" onclick="showTab('tension')">Tension version</button>`;
    outClean.textContent = 'Generating...';
    outClean.classList.add('active');
    outTension.textContent = '';
  } else {
    outSingle.textContent = 'Generating...';
    outSingle.classList.add('active');
  }

  outArea.classList.add('show');

  try {
    const { sys, user } = buildPrompt();
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: sys,
        messages: [{ role: 'user', content: user }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(b => b.text || '').join('') || 'No output returned.';

    if (hasDualOutput) {
      const cleanMatch = text.match(/CLEAN VERSION[\s\S]*?(?=TENSION VERSION|$)/i);
      const tensionMatch = text.match(/TENSION VERSION[\s\S]*/i);
      outClean.textContent = cleanMatch ? cleanMatch[0].replace(/^CLEAN VERSION[:\s]*/i, '').trim() : text;
      outTension.textContent = tensionMatch ? tensionMatch[0].replace(/^TENSION VERSION[:\s]*/i, '').trim() : '(Tension version not found in output)';
    } else {
      outSingle.textContent = text;
    }
  } catch (err) {
    const target = hasDualOutput ? outClean : outSingle;
    target.textContent = 'Error: ' + err.message;
  }

  btn.textContent = 'Generate';
  btn.disabled = false;
}
</script>
</body>
</html>
